<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insertion Sort — Lego 3D</title>
  <style>
/* ─── Reset e base ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:          #d6e4f0;
  --panel-bg:    #1a2a3a;
  --panel-border:#2e4a6a;
  --panel-text:  #a8d8ea;
  --block-w:     80px;
  --block-h:     80px;
  --stud-r:      12px;
  --stud-h:      10px;
  --gap:         18px;
}

body {
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.35) 0%, transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(180,210,240,0.4) 0%, transparent 55%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow-x: hidden;
  user-select: none;
  padding: 20px;
}

/* ─── Painel de instruções flutuante ─── */
#instruction-panel {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel-bg);
  border: 2px solid var(--panel-border);
  border-radius: 10px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.07);
  z-index: 100;
  width: 90%;
  max-width: 600px;
}

#instruction-icon { font-size: 1.7rem; flex-shrink: 0; }
#instruction-text {
  color: var(--panel-text);
  font-size: 1.15rem; /* Aumentado de 0.9rem para 1.15rem */
  letter-spacing: 0.02em;
  line-height: 1.4;
  font-weight: 500;
}
#instruction-text strong { color: #ffffff; }

/* ─── Stage (área dos blocos) ─── */
#stage {
  perspective: 1100px;
  perspective-origin: 50% 15%;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 120px 0 60px;
  width: 100%;
  max-width: 100vw;
}

#blocks-container {
  position: relative;
  margin: 0 auto;
  transition: width 0.5s ease;
}

/* Sombra no chão */
#blocks-container::after {
  content: '';
  position: absolute;
  bottom: -18px;
  left: -10px;
  right: -10px;
  height: 22px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.18) 0%, transparent 75%);
  border-radius: 50%;
  pointer-events: none;
}

/* ─── Bloco Lego ─── */
.lego-block {
  width: var(--block-w);
  position: absolute;
  bottom: 0;
  transform: rotateX(-20deg);
  transform-origin: bottom center;
  transform-style: preserve-3d;
  will-change: left, bottom, transform;
  filter: drop-shadow(0 12px 8px rgba(0,0,0,0.22));
}

.block-body {
  width: var(--block-w);
  height: var(--block-h);
  border-radius: 6px 6px 4px 4px;
  background: var(--color);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    inset 0 -4px 0 rgba(0,0,0,0.25),
    inset 0 4px 0 rgba(255,255,255,0.22),
    inset -4px 0 0 rgba(0,0,0,0.15),
    0 8px 0 color-mix(in srgb, var(--color) 55%, #000);
  transition: box-shadow 0.3s ease;
}

.block-body::after {
  content: '';
  position: absolute;
  right: -9px;
  top: 3px;
  bottom: -7px;
  width: 9px;
  background: color-mix(in srgb, var(--color) 50%, #000);
  border-radius: 0 3px 3px 0;
  transform: skewY(-1.5deg);
}

.block-body::before {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 2px;
  right: -7px;
  height: 7px;
  background: color-mix(in srgb, var(--color) 40%, #000);
  border-radius: 0 0 4px 4px;
  transform: skewX(-1.5deg);
}

.block-number {
  font-size: 1.8rem;
  font-weight: 900;
  color: rgba(255,255,255,0.93);
  text-shadow: 0 2px 5px rgba(0,0,0,0.45);
  position: relative;
  z-index: 2;
}

.studs-row {
  position: absolute;
  top: calc(-1 * var(--stud-h) - 4px);
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 12px;
  z-index: 3;
}

.stud {
  width: calc(var(--stud-r) * 2);
  height: var(--stud-h);
  background: color-mix(in srgb, var(--color) 82%, #fff);
  border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
  box-shadow: 0 -3px 0 color-mix(in srgb, var(--color) 92%, #fff), inset 0 -2px 3px rgba(0,0,0,0.2);
  position: relative;
}

.stud::before {
  content: '';
  position: absolute;
  top: -5px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(var(--stud-r) * 2);
  height: 10px;
  background: color-mix(in srgb, var(--color) 88%, #fff);
  border-radius: 50%;
}

/* Glows */
.lego-block.status-correct { --color: #28dc50 !important; }
.lego-block.status-correct .block-body { box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25), inset 0 4px 0 rgba(255,255,255,0.22), inset -4px 0 0 rgba(0,0,0,0.15), 0 8px 0 color-mix(in srgb, var(--color) 55%, #000), 0 0 20px 5px rgba(40, 220, 80, 0.8); }
.lego-block.status-wrong { --color: #ff3737 !important; }
.lego-block.status-wrong .block-body { box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25), inset 0 4px 0 rgba(255,255,255,0.22), inset -4px 0 0 rgba(0,0,0,0.15), 0 8px 0 color-mix(in srgb, var(--color) 55%, #000), 0 0 20px 5px rgba(255, 55, 55, 0.8); }
.lego-block.active, .lego-block.comparing { --color: #ffdc32 !important; }
.lego-block.active .block-body { box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25), inset 0 4px 0 rgba(255,255,255,0.22), inset -4px 0 0 rgba(0,0,0,0.15), 0 8px 0 color-mix(in srgb, var(--color) 55%, #000), 0 0 28px 8px rgba(255, 220, 50, 0.9); }

@keyframes compare-pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.4); } }
.lego-block.comparing { animation: compare-pulse 0.28s ease 2; }

/* ─── Botões ─── */
#controls {
  display: flex;
  gap: 20px;
  margin-top: 40px;
  justify-content: center;
  width: 100%;
}

.lego-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 0 6px 0;
  outline: none;
}

.btn-face {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  color: #fff;
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: 8px 8px 5px 5px;
  min-width: 120px;
  position: relative;
}

.lego-btn:active .btn-face { transform: translateY(5px); }

#btn-shuffle .btn-face { background: #f4a261; box-shadow: 0 6px 0 #a0622e; }
#btn-shuffle:active .btn-face { box-shadow: 0 1px 0 #a0622e; }
#btn-sort .btn-face { background: #e63946; box-shadow: 0 6px 0 #9b1a22; }
#btn-sort:active .btn-face { box-shadow: 0 1px 0 #9b1a22; }

.btn-studs { display: flex; gap: 6px; }
.btn-stud { width: 12px; height: 6px; background: rgba(255,255,255,0.25); border-radius: 50%; position: relative; }
.btn-stud::before { content: ''; position: absolute; top: -3px; left: 0; width: 12px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 50%; }

.lego-btn:disabled { pointer-events: none; opacity: 0.6; }

/* ─── Media Queries para Responsividade ─── */
@media (max-width: 768px) {
  :root {
    --block-w: 60px;
    --block-h: 60px;
    --stud-r: 9px;
    --stud-h: 8px;
    --gap: 12px;
  }
  .block-number { font-size: 1.4rem; }
  .btn-face { min-width: 100px; font-size: 0.7rem; padding: 8px 15px; }
}

@media (max-width: 480px) {
  :root {
    --block-w: 50px;
    --block-h: 50px;
    --stud-r: 7px;
    --stud-h: 6px;
    --gap: 8px;
  }
  .block-number { font-size: 1.2rem; }
  #instruction-panel { top: 10px; padding: 8px 15px; }
  #instruction-text { font-size: 1rem; }
  #controls { gap: 10px; }
  .btn-face { min-width: 90px; padding: 6px 10px; }
}
  </style>
</head>
<body>

  <div id="instruction-panel">
    <div id="instruction-icon">🔧</div>
    <div id="instruction-text">Pressione <strong>Ordenar Tudo</strong> para começar!</div>
  </div>

  <div id="stage">
    <div id="blocks-container"></div>
  </div>

  <div id="controls">
    <button class="lego-btn" id="btn-shuffle">
      <span class="btn-face">
        <span class="btn-studs"><span class="btn-stud"></span><span class="btn-stud"></span></span>
        Embaralhar
      </span>
    </button>
    <button class="lego-btn" id="btn-sort">
      <span class="btn-face">
        <span class="btn-studs"><span class="btn-stud"></span><span class="btn-stud"></span></span>
        Ordenar Tudo
      </span>
    </button>
  </div>

  <script>
    const BLOCK_COLORS = ['#e63946', '#f4a261', '#e9c46a', '#2a9d8f', '#457b9d', '#9b5de5', '#f15bb5', '#00b4d8'];
    const T_LIFT = 800, T_SLIDE = 1000, T_SNAP = 700, T_PLACE = 1200, T_PAUSE = 800;

    let arr = [], colorMap = {}, sorted = [], steps = [], cursor = 0, busy = false;
    let currentBlockCount = 8;

    const stage = document.getElementById('blocks-container');
    const instrEl = document.getElementById('instruction-text');
    const iconEl = document.getElementById('instruction-icon');
    const btnShuf = document.getElementById('btn-shuffle');
    const btnAuto = document.getElementById('btn-sort');

    function getBlockCount() {
      const width = window.innerWidth;
      if (width < 480) return 3;
      if (width < 600) return 4;
      if (width < 768) return 5;
      if (width < 900) return 6;
      return 8;
    }

    function init() {
      const newCount = getBlockCount();
      currentBlockCount = newCount;
      
      // Gerar números aleatórios únicos entre 0 e 99
      const uniqueNumbers = new Set();
      while (uniqueNumbers.size < newCount) {
        uniqueNumbers.add(Math.floor(Math.random() * 100));
      }
      arr = Array.from(uniqueNumbers);
      
      colorMap = {};
      // Mapear cores baseadas nos valores originais para manter consistência visual
      arr.forEach((v, i) => { colorMap[v] = BLOCK_COLORS[i % BLOCK_COLORS.length]; });
      
      sorted = [...arr].sort((a, b) => a - b);
      steps = precompute([...arr]);
      cursor = 0;
      buildDOM();
      say('🔧', 'Pressione <strong>Ordenar Tudo</strong> para começar!');
      syncButtons();
    }

    function fisherYates(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function precompute(a) {
      const ops = [];
      for (let i = 1; i < a.length; i++) {
        let j = i;
        ops.push({ op: 'pick', i: i, val: a[i] });
        while (j > 0) {
          if (a[j-1] > a[j]) {
            ops.push({ op: 'compare', i: j, j: j-1, valI: a[j], valJ: a[j-1], result: 'swap' });
            [a[j], a[j-1]] = [a[j-1], a[j]];
            j--;
          } else {
            ops.push({ op: 'compare', i: j, j: j-1, valI: a[j], valJ: a[j-1], result: 'stop' });
            break;
          }
        }
        ops.push({ op: 'place', i: j, val: a[j] });
      }
      ops.push({ op: 'done' });
      return ops;
    }

    function getStyles() {
      const style = getComputedStyle(document.documentElement);
      return {
        w: parseInt(style.getPropertyValue('--block-w')),
        g: parseInt(style.getPropertyValue('--gap'))
      };
    }

    function buildDOM() {
      stage.innerHTML = '';
      const { w, g } = getStyles();
      const total = arr.length;
      const stageW = total * w + (total - 1) * g;
      stage.style.width = stageW + 'px';
      stage.style.height = (w + 60) + 'px';

      arr.forEach((val, idx) => {
        const el = makeBlock(val);
        el.style.left = (idx * (w + g)) + 'px';
        stage.appendChild(el);
      });
      refreshGlows();
    }

    function makeBlock(val) {
      const wrap = document.createElement('div');
      wrap.className = 'lego-block';
      wrap.dataset.value = val;
      wrap.style.setProperty('--color', colorMap[val]);
      wrap.style.transition = `left ${T_SLIDE}ms cubic-bezier(.4,0,.2,1), bottom ${T_LIFT}ms cubic-bezier(.4,0,.2,1)`;
      wrap.innerHTML = `<div class="studs-row"><span class="stud"></span><span class="stud"></span></div><div class="block-body"><span class="block-number">${val}</span></div>`;
      return wrap;
    }

    function refreshGlows() {
      const { w, g } = getStyles();
      stage.querySelectorAll('.lego-block').forEach(el => {
        const val = parseInt(el.dataset.value);
        const idx = Math.round(parseFloat(el.style.left) / (w + g));
        el.classList.remove('status-correct', 'status-wrong');
        el.classList.add(val === sorted[idx] ? 'status-correct' : 'status-wrong');
      });
    }

    function say(icon, html) { iconEl.textContent = icon; instrEl.innerHTML = html; }
    function syncButtons() { btnShuf.disabled = busy; btnAuto.disabled = busy || cursor >= steps.length; }

    async function runStep() {
      if (cursor >= steps.length) return;
      const s = steps[cursor++];
      if (s.op === 'pick') await doPick(s.val);
      else if (s.op === 'compare') await doCompare(s.valI, s.valJ, s.result);
      else if (s.op === 'place') await doPlace(s.val);
      else if (s.op === 'done') await doDone();
    }

    async function doPick(val) {
      const el = blockByVal(val);
      say('⬆️', `Selecionando <strong>${val}</strong> para inserir.`);
      el.classList.add('active');
      el.style.bottom = '110px';
      el.style.zIndex = '50';
      await wait(T_LIFT + 400);
    }

    async function doCompare(valI, valJ, result) {
      const elI = blockByVal(valI), elJ = blockByVal(valJ);
      const { w, g } = getStyles();
      elI.classList.add('comparing');
      elJ.classList.add('comparing');
      if (result === 'swap') {
        say('🔍', `<strong>${valJ} > ${valI}</strong>: movendo <strong>${valJ}</strong>.`);
        const leftI = elI.style.left, leftJ = elJ.style.left;
        elI.style.left = leftJ; elJ.style.left = leftI;
        await wait(T_SLIDE + 600);
      } else {
        say('🔍', `<strong>${valJ} < ${valI}</strong>: posição encontrada!`);
        await wait(T_PLACE);
      }
      elI.classList.remove('comparing');
      elJ.classList.remove('comparing');
    }

    async function doPlace(val) {
      const el = blockByVal(val);
      say('⬇️', `Encaixando <strong>${val}</strong>.`);
      el.classList.remove('active');
      el.style.bottom = '0';
      await wait(T_SNAP);
      el.style.zIndex = '';
      refreshGlows();
      await wait(400);
    }

    async function doDone() {
      say('🎉', '<strong>Ordenação completa!</strong>');
      stage.querySelectorAll('.lego-block').forEach(b => b.classList.add('comparing'));
      await wait(1000);
      stage.querySelectorAll('.lego-block').forEach(b => b.classList.remove('comparing'));
    }

    function blockByVal(v) { return stage.querySelector(`.lego-block[data-value="${v}"]`); }
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    btnShuf.addEventListener('click', () => { if (!busy) init(); });
    btnAuto.addEventListener('click', async () => { 
      if (!busy) { 
        busy = true;
        syncButtons();
        while(cursor < steps.length) { 
          await runStep(); 
          await wait(T_PAUSE); 
        } 
        busy = false;
        syncButtons();
      } 
    });

    window.addEventListener('resize', () => { if (!busy && getBlockCount() !== currentBlockCount) init(); });

    init();
  </script>
</body>
</html>
